name: CI/CD

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: educast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-build:
    name: Backend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build backend package
        working-directory: backend
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests

  ml-build:
    name: ML build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
            python-version: "3.12"
            cache: pip

      - name: Install dependencies
        working-directory: ml-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build ML
        working-directory: ml-service
        run: |
          python -m py_compile *.py
          uvicorn main:app --host 127.0.0.1 --port 8000 &
          sleep 10
          curl -f http://127.0.0.1:8000/docs

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build


  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: python -m pip install -r tests/requirements.txt

      - name: Run Python unit tests
        run: python -m pytest tests/unit

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - backend-build
      - frontend-build
      - ml-build
      - unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Build Docker images
        run: docker compose build

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs:
      - docker-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: python -m pip install -r tests/requirements.txt

      - name: Start services
        run: docker compose up -d --wait
        env:
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Run integration tests
        run: python -m pytest tests/integration

      - name: Show DB logs if failed
        if: failure()
        run: docker compose logs db

      - name: Stop application
        if: always()
        run: docker compose down -v

  e2e-tests:
    name: E2E tests
    runs-on: ubuntu-latest
    needs:
      - integration-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: python -m pip install -r tests/requirements.txt

      - name: Start services
        run: docker compose up -d --wait
        env:
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Run E2E tests
        run: python -m pytest tests/e2e

      - name: Stop application
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy on VM
    runs-on: ubuntu-latest
    needs:
      - e2e-tests

    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/tests'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy application
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
            set -e

            cd EduCast

            git fetch origin
            git reset --hard origin/main

            docker compose down
            docker compose up -d --build

            docker image prune -f
          EOF
