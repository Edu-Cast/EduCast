name: CI/CD

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy this revision to the VM"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      run_e2e_after_deploy:
        description: "Run Python tests against the deployed VM"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: educast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VM_HOST: ${{ secrets.VM_HOST }}
  VM_USER: ${{ secrets.VM_USER }}
  VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
  SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
  SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
  SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
  MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
  MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}

jobs:
  backend-build:
    name: Backend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build backend package
        working-directory: backend
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - backend-build
      - frontend-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Build Docker images
        run: docker compose build

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs:
      - backend-build
      - frontend-build
      - docker-build
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/tests') ||
      (github.event_name == 'workflow_dispatch' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/tests') && inputs.deploy == 'true')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        run: |
          test -n "$VM_HOST"
          test -n "$VM_USER"
          test -n "$VM_SSH_KEY"
          test -n "$SPRING_DATASOURCE_URL"
          test -n "$SPRING_DATASOURCE_USERNAME"
          test -n "$SPRING_DATASOURCE_PASSWORD"
          test -n "$MAIL_USERNAME"
          test -n "$MAIL_PASSWORD"
          test -n "$JWT_SECRET"

      - name: Prepare SSH key
        run: |
          set -x
          mkdir -p ~/.ssh
          printf '%s\n' "$VM_SSH_KEY" > ~/.ssh/educast_deploy_key
          chmod 600 ~/.ssh/educast_deploy_key
          ls -la ~/.ssh
          ssh-keygen -y -f ~/.ssh/educast_deploy_key > /dev/null
          ssh-keyscan -T 10 -H "$VM_HOST" >> ~/.ssh/known_hosts

      - name: Create production environment file
        run: |
          cat > .env.deploy <<EOF
          SPRING_DATASOURCE_URL=$SPRING_DATASOURCE_URL
          SPRING_DATASOURCE_USERNAME=$SPRING_DATASOURCE_USERNAME
          SPRING_DATASOURCE_PASSWORD=$SPRING_DATASOURCE_PASSWORD
          MAIL_USERNAME=$MAIL_USERNAME
          MAIL_PASSWORD=$MAIL_PASSWORD
          JWT_SECRET=$JWT_SECRET
          EOF

      - name: Package release
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.idea' \
            --exclude='.pytest_cache' \
            --exclude='tests/__pycache__' \
            --exclude='.env' \
            --exclude='.ssh' \
            -czf /tmp/educast-release.tar.gz .

      - name: Upload release to VM
        run: |
          scp -i ~/.ssh/educast_deploy_key /tmp/educast-release.tar.gz "$VM_USER@$VM_HOST:/tmp/educast-release.tar.gz"
          scp -i ~/.ssh/educast_deploy_key .env.deploy "$VM_USER@$VM_HOST:/tmp/educast.env"

      - name: Deploy Docker Compose on VM
        run: |
          ssh -i ~/.ssh/educast_deploy_key "$VM_USER@$VM_HOST" <<'EOF'
          set -e

          APP_DIR=/root/EduCast
          NEW_DIR=/root/EduCast.new
          OLD_DIR=/root/EduCast.old

          rm -rf "$NEW_DIR"
          mkdir -p "$NEW_DIR"
          tar -xzf /tmp/educast-release.tar.gz -C "$NEW_DIR"
          mv /tmp/educast.env "$NEW_DIR/.env"

          rm -rf "$OLD_DIR"
          if [ -d "$APP_DIR" ]; then
            mv "$APP_DIR" "$OLD_DIR"
          fi
          mv "$NEW_DIR" "$APP_DIR"

          cd "$APP_DIR"
          docker compose up --build -d --remove-orphans
          docker compose ps
          EOF

      - name: Verify deployed VM
        run: |
          for i in {1..40}; do
            if curl --fail --silent "http://$VM_HOST/api/podcasts" > /tmp/educast-health.json; then
              cat /tmp/educast-health.json
              exit 0
            fi
            sleep 3
          done

          ssh -i ~/.ssh/educast_deploy_key "$VM_USER@$VM_HOST" 'cd /root/EduCast && docker compose ps && docker compose logs'
          exit 1

  python-e2e-on-vm:
    name: Python E2E on deployed VM
    runs-on: ubuntu-latest
    needs:
      - deploy
    if: github.event_name == 'workflow_dispatch' && inputs.run_e2e_after_deploy == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate VM host secret
        run: test -n "$VM_HOST"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python test dependencies
        run: python -m pip install -r tests/requirements.txt

      - name: Run Python tests against VM
        env:
          EDUCAST_BASE_URL: http://${{ secrets.VM_HOST }}
          EDUCAST_FRONTEND_URL: http://${{ secrets.VM_HOST }}
        run: python -m pytest tests
