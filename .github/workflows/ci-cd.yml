name: CI/CD

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: educast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  backend-build:
    name: Backend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/edu-cast/educast_backend:latest

  ml-service-build:
    name: ML Service build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ML Service
        uses: docker/build-push-action@v6
        with:
          context: ./ml-service
          push: true
          tags: ghcr.io/edu-cast/educast_ml_service:latest

  bot-build:
    name: Bot build
    runs-on: ubuntu-latest

    env:
      SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
      SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push TG Bot
        uses: docker/build-push-action@v6
        with:
          context: ./telegram-bot
          push: true
          tags: ghcr.io/edu-cast/educast_telegram_bot:latest
        
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/edu-cast/educast_frontend:latest

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: python -m pip install -r tests/requirements.txt

      - name: Run Python unit tests
        run: python -m pytest tests/unit

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - backend-build
      - frontend-build
      - ml-service-build
      - bot-build
      - unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Build Docker images
        run: docker compose build

  integration-and-e2e-tests:
    name: Integration and E2E tests
    runs-on: ubuntu-latest
    needs:
      - docker-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: python -m pip install -r tests/requirements.txt

      - name: Start services
        run: docker compose up -d --wait
        env:
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Run integration tests
        run: python -m pytest tests/integration

      - name: Run E2E tests
        run: python -m pytest tests/e2e

      - name: Show logs if something failed
        if: failure()
        run: |
          docker compose logs

      - name: Stop application
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy on VM
    runs-on: ubuntu-latest
    needs:
      - integration-and-e2e-tests

    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/tests'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Create .env
        uses: 0ndt/envfile@v2
        with:
          secrets: ${{ toJSON(secrets) }}
          exclude: GHCR_PAT, VM_USER, VM_HOST, VM_SSH_KEY, VM_SSH_PASSPHRASE, TAILSCALE_AUTHKEY

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Verify SSH key
        run: |
          ssh-keygen -lf ~/.ssh/id_ed25519

      - name: Deploy application
        env:
          SSH_PASSPHRASE: ${{ secrets.VM_SSH_PASSPHRASE }}
        run: |
          eval "$(ssh-agent -s)"
    
          cat > askpass.sh << 'EOF'
          #!/bin/sh
          echo "$SSH_PASSPHRASE"
          EOF
    
          chmod +x askpass.sh
    
          DISPLAY=:0 SSH_ASKPASS=$PWD/askpass.sh setsid ssh-add ~/.ssh/id_ed25519 < /dev/null
    
          ssh \
          ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} \
          "cd EduCast \
          cat > /EduCast/.env << 'EOF' \
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          EOF
          docker compose pull \
          docker compose up -d --wait \
          docker image prune -f"

      - name: Check Tailscale
        run: |
          tailscale status
          tailscale ping ${{ secrets.VM_HOST }}

      - name: Show logs if something failed
        if: failure()
        run: |
          docker compose logs frontend

      - name: Stop application
        if: always()
        run: docker compose down -v