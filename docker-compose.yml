version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: educast-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
    ports:
      - "5433:5432"
    volumes:
      - educast_pg_data:/var/lib/postgresql/data

volumes:
  educast_pg_data:
