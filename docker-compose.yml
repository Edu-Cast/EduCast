services:

  # ──────────────────── PostgreSQL ────────────────────
  db:
    image: postgres:15
    platform: linux/amd64
    container_name: capstone_db
    restart: always
    environment:
      POSTGRES_DB: capstone
      POSTGRES_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME} -d capstone && psql -U ${SPRING_DATASOURCE_USERNAME} -d capstone -c 'SELECT 1'" ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 20s
    networks:
      - app-network

  # ──────────────────── Ollama (LLM) ──────────────────
  ollama:
    image: ollama/ollama
    container_name: educast_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ──────────────────── ML Service ────────────────────
  ml-service:
    image: ghcr.io/edu-cast/educast-ml-service:latest
    container_name: educast_ml_service
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - app-network

  # ──────────────────── Backend ────────────────────────
  backend:
    image: ghcr.io/edu-cast/educast-backend:latest
    platform: linux/amd64
    container_name: educast_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/api/podcasts" ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ML_SERVICE_URL: http://ml-service:8000
      FILE_UPLOAD_DIR: /app/uploads
    expose:
      - "8080"
    volumes:
      - podcast_uploads:/app/uploads
    networks:
      - app-network

  # ──────────────────── Frontend ──────────────────────
  frontend:
    image: ghcr.io/edu-cast/educast_frontend:latest
    container_name: educast_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:80/api/podcasts || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    ports:
      - "80:80"
    networks:
      - app-network

  # ──────────────────── Telegram Bot ─────────────────
  telegram-bot:
    image: ghcr.io/edu-cast/educast-telegram-bot:latest
    container_name: educast_telegram_bot
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      API_BASE_URL: http://backend:8080
    networks:
      - app-network

volumes:
  postgres_data:
  ollama_data:
  podcast_uploads:

networks:
  app-network:
    driver: bridge